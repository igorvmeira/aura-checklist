<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura — Checklist Operacional</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ════════════════════════════════════════
     TELA DE LOGIN
════════════════════════════════════════ -->
<div id="view-login">
  <div class="login-card">
    <div class="login-logo">Aura <span>Checklist</span></div>
    <p class="login-subtitle">Operações &amp; Qualidade</p>

    <div class="field-group">
      <label>Seu nome</label>
      <input id="login-nome" type="text" placeholder="Ex: Carlos Silva" autocomplete="off" />
    </div>

    <div class="field-group">
      <label>Setor</label>
      <select id="login-setor">
        <option value="">Selecione o setor…</option>
        <option value="bar_principal">Bar Principal</option>
        <option value="bar_back">Bar Back</option>
        <option value="salao">Salão</option>
        <option value="cozinha">Cozinha</option>
        <option value="pizzaria">Pizzaria</option>
        <option value="lavacao">Lavação</option>
        <option value="supervisor">Supervisor / Gestão</option>
      </select>
    </div>

    <div class="field-group" id="turno-group">
      <label>Turno</label>
      <div class="toggle-group">
        <button class="toggle-btn active" data-value="abertura" onclick="selectTurno(this)">Abertura</button>
        <button class="toggle-btn" data-value="fechamento" onclick="selectTurno(this)">Fechamento</button>
      </div>
    </div>

    <button class="btn-primary" onclick="entrar()">Entrar</button>

    <p class="login-info">Os registros são salvos em tempo real no Firebase para a equipe acompanhar.</p>
  </div>
</div>

<!-- ════════════════════════════════════════
     APP PRINCIPAL
════════════════════════════════════════ -->
<div id="app" style="display:none">

  <!-- HEADER -->
  <header class="app-header">
    <div class="app-logo">Aura <span>Checklist</span></div>
    <div class="header-meta">
      <span class="badge-role" id="badge-role"></span>
      <span class="badge-date" id="badge-date"></span>
    </div>
  </header>

  <!-- VISÃO GERAL (supervisor) -->
  <div id="view-overview" style="display:none">
    <div class="overview-wrap">
      <div class="overview-title">Visão Geral do Dia</div>
      <p class="overview-sub" id="overview-date-label"></p>
      <div class="overview-grid" id="overview-grid"></div>
    </div>

    <!-- Detalhe de setor (supervisor) -->
    <div id="setor-detail" style="display:none">
      <div class="detail-header">
        <button class="btn-back" onclick="fecharDetalhe()">← Voltar</button>
        <div class="detail-title" id="detail-title"></div>
      </div>
      <div class="detail-body" id="detail-body"></div>
      <div class="assinatura-supervisor" id="assinatura-supervisor-wrap">
        <p class="assin-label">Assinatura do Supervisor</p>
        <input id="assin-supervisor-input" type="text" placeholder="Digite seu nome completo para confirmar" />
        <button class="btn-primary" onclick="assinarSupervisor()">Assinar como Supervisor</button>
        <p class="assin-signed" id="assin-supervisor-signed" style="display:none"></p>
      </div>
    </div>
  </div>

  <!-- CHECKLIST (colaborador) -->
  <div id="view-checklist" style="display:none">
    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span class="progress-label" id="progress-label">0%</span>
    </div>

    <div class="checklist-header">
      <div class="cl-setor" id="cl-setor-label"></div>
      <div class="cl-turno" id="cl-turno-label"></div>
    </div>

    <div id="checklist-content"></div>

    <!-- ASSINATURA DO RESPONSÁVEL -->
    <div class="assinatura-wrap" id="assinatura-wrap" style="display:none">
      <p class="assin-label">Assinatura do Responsável</p>
      <textarea id="obs-textarea" placeholder="Observações (opcional)…" rows="3"></textarea>
      <input id="assin-input" type="text" placeholder="Digite seu nome completo para assinar" />
      <button class="btn-primary" onclick="assinarResponsavel()">Finalizar e Assinar</button>
      <p class="assin-signed" id="assin-signed" style="display:none"></p>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" id="nav-btn-checklist" onclick="showView('checklist')">
      <span>✅</span> Checklist
    </button>
    <button class="nav-btn" id="nav-btn-overview" onclick="showView('overview')">
      <span>📊</span> Visão Geral
    </button>
    <button class="nav-btn" onclick="logout()">
      <span>↩</span> Sair
    </button>
  </nav>
</div>

<!-- ════════════════════════════════════════
     FIREBASE + APP.JS
════════════════════════════════════════ -->
<script type="module" src="app.js"></script>

</body>
</html>
